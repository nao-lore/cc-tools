name: Daily Tool Deploy

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of tools to deploy"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check pending stock
        id: check
        run: |
          priority=$(find stock/priority -name "meta.json" 2>/dev/null | wc -l)
          pending=$(find stock/pending -name "meta.json" 2>/dev/null | wc -l)
          count=$((priority + pending))
          echo "pending=$count" >> "$GITHUB_OUTPUT"
          echo "$priority priority + $pending pending = $count total in stock"

      - name: Deploy tools from stock
        if: steps.check.outputs.pending != '0'
        env:
          DEPLOY_COUNT: ${{ github.event.inputs.count || '5' }}
        run: python3 scripts/stock-to-deploy.py "$DEPLOY_COUNT"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.pending != '0'
        with:
          node-version: "22"
          cache: "npm"

      - name: Type check before deploy
        if: steps.check.outputs.pending != '0'
        run: |
          npm ci
          npx tsc --noEmit
          echo "Type check passed"

      - name: Commit and push
        if: steps.check.outputs.pending != '0'
        run: |
          git config user.name "cc-factory-bot"
          git config user.email "nao@loresync.dev"
          git add app/ tools/ lib/ stock/
          DEPLOYED=$(git diff --cached --name-only --diff-filter=A -- 'app/*/page.tsx' | wc -l | tr -d ' ')
          if [ "$DEPLOYED" -gt 0 ]; then
            SLUGS=$(git diff --cached --name-only --diff-filter=A -- 'app/*/page.tsx' | sed 's|app/||;s|/page.tsx||' | tr '\n' ', ' | sed 's/,$//')
            git commit -m "feat: deploy $DEPLOYED tools — $SLUGS"
            git push
            echo "Deployed $DEPLOYED tools: $SLUGS"
          else
            echo "No new tools to commit"
            git reset HEAD
          fi
